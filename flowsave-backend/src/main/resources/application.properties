spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# Schema is managed manually via SQL — do NOT let Hibernate run DDL
# (Supabase session-mode pooler caps at 15 connections; DDL needs an extra isolated connection)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# HikariCP connection pool — keep well under Supabase's 15-connection session limit
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

flowsave.jwt.secret=${JWT_SECRET}
flowsave.jwt.expiry-ms=${JWT_EXPIRY_MS:604800000}

flowsave.groq.api-key=${GROQ_API_KEY}
flowsave.groq.model=llama-3.3-70b-versatile

server.port=${PORT:8080}
